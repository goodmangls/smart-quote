databases:
  - name: smart-quote-db-sg # Changed name to force new creation
    databaseName: smart_quote_api_sg
    user: smart_quote_api
    plan: free
    region: singapore

services:
  - type: web
    name: smart-quote-api
    runtime: ruby
    rootDir: smart-quote-api
    buildCommand: 'bundle install && bundle exec rails db:prepare'
    startCommand: 'bundle exec puma -C config/puma.rb'
    plan: free
    region: singapore # Closest to KR/User
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smart-quote-db-sg # Match the new DB name
          property: connectionString
      - key: RAILS_LOG_TO_STDOUT
        value: 'true'
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: FRONTEND_URL
        value: 'https://bridgelogis.com'
      - key: RESEND_API_KEY
        sync: false
      - key: MAILER_FROM
        value: 'no-reply@bridgelogis.com'
      - key: CORS_ORIGINS
        value: 'https://smart-quote-main.vercel.app,https://bridgelogis.com,https://www.bridgelogis.com'
      - key: REFRESH_COOKIE_SECURE
        value: 'true'
      - key: REFRESH_COOKIE_SAME_SITE
        value: 'None'
    healthCheckPath: /up
